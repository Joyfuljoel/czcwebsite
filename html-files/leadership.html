<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadership Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .profile-card {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        .admin-controls {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .profile-card:hover .admin-controls {
            opacity: 1;
        }
        .search-container {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(16, 163, 74, 0.2) 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
  <!-- Header/Navigation -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center">
               <div><img src="/image-files/logo-sda/adventist-symbol--treefrog.png" alt="SDA Logo"  class="w-10 h-10 object-cover"></div>
                <a href="index.html" class="text-2xl font-bold text-green-600">Copperbelt Zambia Conference</a>
            </div>
            
            <!-- Desktop Navigation -->
            <nav class="hidden md:flex space-x-8">
                <a href="index.html" class="text-green-800 font-medium hover:tex0t-green-600 transition">Home</a>
                <a href="archives.html" class="text-gray-700 hover:text-green-600 transition">Sermons</a>
                <a href="eventsandnews.html" class="text-gray-700 hover:text-green-600 transition">News</a>
                <a href="eventsandnews.html" class="text-gray-700 hover:text-green-600 transition">Events</a>
                <a href="archives.html" class="text-gray-700 hover:text-green-600 transition">Gallery</a>
               
            
            <!-- Mobile menu button -->
            <button id="menu-toggle" class="md:hidden text-gray-700 focus:outline-none">
                <i class="fas fa-bars text-2xl"></i>
            </button>
        </div>
          
        <!-- Mobile Navigation -->
        <div id="mobile-menu" class="hidden md:hidden bg-white w-full px-4 pb-4">
            <div class="flex flex-col space-y-3">
                <a href="index.html" class="text-green-600 font-medium py-2 border-b">Home</a>
                <a href="archives.html" class="text-gray-700 py-2 border-b">Sermons</a>
                <a href="eventsandnews.html" class="text-gray-700 py-2 border-b">News</a>
                <a href="eventsandnews.html" class="text-gray-700 py-2 border-b">Events</a>
                <a href="archives.html" class="text-gray-700 py-2 border-b">Gallery</a>
               
            </div>
        </div>
    </header>


    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-primary-800 mb-2">CZC Leadership Board</h1>
            <p class="text-lg text-gray-600">Meet our exceptional team of leaders</p>
        </div>

        <!-- Search and Filter Section -->
        <div class="search-container rounded-xl p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow relative">
                    <input type="text" placeholder="Search leaders..." 
                        class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                </div>
                <select class="bg-white border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    <option value="">All Departments</option>
                    <option value="executive">Executive</option>
                    <option value="technology">Technology</option>
                    <option value="marketing">Marketing</option>
                    <option value="operations">Operations</option>
                    <option value="finance">Finance</option>
                </select>
                <select class="bg-white border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    <option value="">All Roles</option>
                    <option value="ceo">CEO</option>
                    <option value="cto">CTO</option>
                    <option value="cmo">CMO</option>
                    <option value="director">Director</option>
                    <option value="manager">Manager</option>
                </select>
                <button id="addLeaderBtn" class="bg-primary-600 hover:bg-primary-700 text-white font-medium py-3 px-6 rounded-lg flex items-center gap-2 transition-colors">
                    <i class="fas fa-plus"></i> Add Leader
                </button>
            </div>
        </div>

        <!-- Leadership Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="leadershipGrid">
            <!-- Profile cards will be dynamically inserted here -->
        </div>

        <!-- Add/Edit Modal (hidden by default) -->
        <div id="leaderModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden overflow-y-auto py-8">
            <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4 max-h-[90vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-semibold text-gray-800" id="modalTitle">Add New Leader</h3>
                    <button id="closeModal" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="leaderForm" class="space-y-4">
                    <input type="hidden" id="leaderId">
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="name">Full Name</label>
                        <input type="text" id="name" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="title">Title</label>
                        <input type="text" id="title" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="department">Department</label>
                        <select id="department" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                            <option value="executive">Executive</option>
                            <option value="technology">Technology</option>
                            <option value="marketing">Marketing</option>
                            <option value="operations">Operations</option>
                            <option value="finance">Finance</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="role">Role</label>
                        <select id="role" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                            <option value="ceo">CEO</option>
                            <option value="cto">CTO</option>
                            <option value="cmo">CMO</option>
                            <option value="director">Director</option>
                            <option value="manager">Manager</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="bio">Bio</label>
                        <textarea id="bio" rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="email">Email</label>
                        <input type="email" id="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="phone">Phone</label>
                        <input type="tel" id="phone" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="photo">Photo URL</label>
                        <input type="text" id="photo" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div class="sticky bottom-0 bg-white pt-4 pb-2 -mx-6 px-6 border-t border-gray-200">
                        <div class="flex justify-end gap-3">
                            <button type="button" id="cancelModal" class="px-4 py-2 border rounded-lg text-gray-700 hover:bg-gray-100">Cancel</button>
                            <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700">Save</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Sample data
        const leaders = [
            {
                id: 1,
                name: "Sarah Johnson",
                title: "Chief Executive Officer",
                department: "executive",
                role: "ceo",
                bio: "Visionary leader with 15+ years of experience driving organizational growth and innovation.",
                email: "sarah.johnson@example.com",
                phone: "(555) 123-4567",
                photo: "https://randomuser.me/api/portraits/women/65.jpg"
            },
            {
                id: 2,
                name: "Michael Chen",
                title: "Chief Technology Officer",
                department: "technology",
                role: "cto",
                bio: "Technology strategist passionate about building scalable systems and fostering engineering excellence.",
                email: "michael.chen@example.com",
                phone: "(555) 234-5678",
                photo: "https://randomuser.me/api/portraits/men/32.jpg"
            },
            {
                id: 3,
                name: "Emily Rodriguez",
                title: "Chief Marketing Officer",
                department: "marketing",
                role: "cmo",
                bio: "Creative marketer with a proven track record of building strong brands and customer relationships.",
                email: "emily.rodriguez@example.com",
                phone: "(555) 345-6789",
                photo: "https://randomuser.me/api/portraits/women/44.jpg"
            },
            {
                id: 4,
                name: "David Kim",
                title: "Director of Operations",
                department: "operations",
                role: "director",
                bio: "Operations expert focused on process optimization and delivering exceptional customer experiences.",
                email: "david.kim@example.com",
                phone: "(555) 456-7890",
                photo: "https://randomuser.me/api/portraits/men/75.jpg"
            },
            {
                id: 5,
                name: "Lisa Wong",
                title: "Finance Manager",
                department: "finance",
                role: "manager",
                bio: "Detail-oriented financial professional with expertise in budgeting, forecasting, and strategic planning.",
                email: "lisa.wong@example.com",
                phone: "(555) 567-8901",
                photo: "https://randomuser.me/api/portraits/women/68.jpg"
            },
            {
                id: 6,
                name: "Robert Taylor",
                title: "Product Director",
                department: "technology",
                role: "director",
                bio: "Product leader with a passion for user-centered design and delivering innovative solutions.",
                email: "robert.taylor@example.com",
                phone: "(555) 678-9012",
                photo: "https://randomuser.me/api/portraits/men/81.jpg"
            }
        ];

        // DOM elements
        const leadershipGrid = document.getElementById('leadershipGrid');
        const addLeaderBtn = document.getElementById('addLeaderBtn');
        const leaderModal = document.getElementById('leaderModal');
        const closeModal = document.getElementById('closeModal');
        const cancelModal = document.getElementById('cancelModal');
        const leaderForm = document.getElementById('leaderForm');
        const modalTitle = document.getElementById('modalTitle');

        // Form fields
        const leaderIdField = document.getElementById('leaderId');
        const nameField = document.getElementById('name');
        const titleField = document.getElementById('title');
        const departmentField = document.getElementById('department');
        const roleField = document.getElementById('role');
        const bioField = document.getElementById('bio');
        const emailField = document.getElementById('email');
        const phoneField = document.getElementById('phone');
        const photoField = document.getElementById('photo');

        // Current state
        let currentLeaderId = null;
        let isEditing = false;

        // Render all leaders
        function renderLeaders() {
            leadershipGrid.innerHTML = '';
            leaders.forEach(leader => {
                leadershipGrid.appendChild(createLeaderCard(leader));
            });
        }

        // Create a leader card element
        function createLeaderCard(leader) {
            const card = document.createElement('div');
            card.className = 'profile-card bg-white rounded-xl overflow-hidden relative';
            card.dataset.id = leader.id;
            card.dataset.department = leader.department;
            card.dataset.role = leader.role;

            // Department color mapping
            const departmentColors = {
                executive: 'bg-primary-700',
                technology: 'bg-blue-600',
                marketing: 'bg-purple-600',
                operations: 'bg-amber-600',
                finance: 'bg-emerald-600'
            };

            // Role icons
            const roleIcons = {
                ceo: 'crown',
                cto: 'microchip',
                cmo: 'bullhorn',
                director: 'user-tie',
                manager: 'user-gear'
            };

            card.innerHTML = `
                <div class="absolute top-4 right-4 admin-controls flex gap-2">
                    <button class="edit-btn p-2 bg-white rounded-full shadow-md text-primary-600 hover:bg-primary-50" data-id="${leader.id}">
                        <i class="fas fa-pencil"></i>
                    </button>
                    <button class="delete-btn p-2 bg-white rounded-full shadow-md text-red-600 hover:bg-red-50" data-id="${leader.id}">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="${departmentColors[leader.department]} h-32 w-full flex items-center justify-center">
                    <img src="${leader.photo}" alt="${leader.name}" class="w-24 h-24 rounded-full border-4 border-white object-cover">
                </div>
                <div class="p-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-xl font-bold text-gray-800">${leader.name}</h3>
                        <span class="text-primary-600" title="${leader.role.toUpperCase()}">
                            <i class="fas fa-${roleIcons[leader.role]}"></i>
                        </span>
                    </div>
                    <p class="text-primary-700 font-medium mb-3">${leader.title}</p>
                    <p class="text-gray-600 text-sm mb-4">${leader.bio}</p>
                    <div class="border-t border-gray-200 pt-4">
                        <div class="flex items-center gap-2 mb-2">
                            <i class="fas fa-envelope text-primary-600"></i>
                            <a href="mailto:${leader.email}" class="text-gray-700 hover:text-primary-600 text-sm">${leader.email}</a>
                        </div>
                        <div class="flex items-center gap-2">
                            <i class="fas fa-phone text-primary-600"></i>
                            <a href="tel:${leader.phone}" class="text-gray-700 hover:text-primary-600 text-sm">${leader.phone}</a>
                        </div>
                    </div>
                </div>
            `;

            return card;
        }

        // Open modal for adding new leader
        function openAddModal() {
            isEditing = false;
            modalTitle.textContent = 'Add New Leader';
            leaderForm.reset();
            leaderIdField.value = '';
            currentLeaderId = null;
            leaderModal.classList.remove('hidden');
        }

        // Open modal for editing leader
        function openEditModal(id) {
            isEditing = true;
            const leader = leaders.find(l => l.id == id);
            if (leader) {
                modalTitle.textContent = 'Edit Leader';
                leaderIdField.value = leader.id;
                nameField.value = leader.name;
                titleField.value = leader.title;
                departmentField.value = leader.department;
                roleField.value = leader.role;
                bioField.value = leader.bio;
                emailField.value = leader.email;
                phoneField.value = leader.phone;
                photoField.value = leader.photo;
                currentLeaderId = id;
                leaderModal.classList.remove('hidden');
            }
        }

        // Close modal
        function closeLeaderModal() {
            leaderModal.classList.add('hidden');
        }

        // Save leader (add or update)
        function saveLeader(e) {
            e.preventDefault();
            
            const leaderData = {
                id: isEditing ? parseInt(leaderIdField.value) : leaders.length > 0 ? Math.max(...leaders.map(l => l.id)) + 1 : 1,
                name: nameField.value,
                title: titleField.value,
                department: departmentField.value,
                role: roleField.value,
                bio: bioField.value,
                email: emailField.value,
                phone: phoneField.value,
                photo: photoField.value || 'https://randomuser.me/api/portraits/lego/1.jpg'
            };

            if (isEditing) {
                // Update existing leader
                const index = leaders.findIndex(l => l.id == currentLeaderId);
                if (index !== -1) {
                    leaders[index] = leaderData;
                }
            } else {
                // Add new leader
                leaders.push(leaderData);
            }

            renderLeaders();
            closeLeaderModal();
        }

        // Delete leader
        function deleteLeader(id) {
            if (confirm('Are you sure you want to delete this leader?')) {
                const index = leaders.findIndex(l => l.id == id);
                if (index !== -1) {
                    leaders.splice(index, 1);
                    renderLeaders();
                }
            }
        }

        // Event listeners
        addLeaderBtn.addEventListener('click', openAddModal);
        closeModal.addEventListener('click', closeLeaderModal);
        cancelModal.addEventListener('click', closeLeaderModal);
        leaderForm.addEventListener('submit', saveLeader);
        
        // Search and filter elements
        const searchInput = document.querySelector('input[type="text"]');
        const departmentFilter = document.querySelector('select:first-of-type');
        const roleFilter = document.querySelector('select:last-of-type');

        // Add event listeners for filtering
        searchInput.addEventListener('input', filterLeaders);
        departmentFilter.addEventListener('change', filterLeaders);
        roleFilter.addEventListener('change', filterLeaders);

        // Delegated event listeners for edit and delete buttons
        leadershipGrid.addEventListener('click', (e) => {
            if (e.target.closest('.edit-btn')) {
                const id = e.target.closest('.edit-btn').dataset.id;
                openEditModal(id);
            } else if (e.target.closest('.delete-btn')) {
                const id = e.target.closest('.delete-btn').dataset.id;
                deleteLeader(id);
            }
        });

        // Filter leaders based on search and filters
        function filterLeaders() {
            const searchTerm = searchInput.value.toLowerCase();
            const departmentValue = departmentFilter.value;
            const roleValue = roleFilter.value;

            const filtered = leaders.filter(leader => {
                const matchesSearch = leader.name.toLowerCase().includes(searchTerm) || 
                                     leader.title.toLowerCase().includes(searchTerm) ||
                                     leader.bio.toLowerCase().includes(searchTerm);
                const matchesDepartment = !departmentValue || leader.department === departmentValue;
                const matchesRole = !roleValue || leader.role === roleValue;

                return matchesSearch && matchesDepartment && matchesRole;
            });

            // Clear and re-render filtered leaders
            leadershipGrid.innerHTML = '';
            filtered.forEach(leader => {
                leadershipGrid.appendChild(createLeaderCard(leader));
            });
        }

        // Initial render
        renderLeaders();
    </script>
</body>
</html>
